<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CaseTracker</title>
    <!--
      GitHub Pages single-page-app fallback. Any unknown path is served this
      file; it rewrites the URL into a query string and bounces to index.html,
      which restores the real route. pathSegmentsToKeep = 1 because the app is
      hosted under the project sub-path /casetracker/.
    -->
    <script>
      (function (l) {
        var pathSegmentsToKeep = 1;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
